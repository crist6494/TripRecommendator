<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripRecommendator</title>
    <link rel="icon" href="./resources/17189827.png">
    <link href="./node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel='stylesheet' type='text/css' href='https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.25.1/maps/maps.css'>
    <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
    <div class="">
        <section class="header text-left w-100 d-flex align-items-center flex-column flex-md-row gap-3 justify-content-between px-5 py-4">
            <div class="d-flex align-items-center gap-3">
                <img src="./resources/17189827.png" alt="">
                <h1>TripRecommendator</h1>
            </div>
            <select id="theme-select" name="theme">
                <option value="dark">Dark</option>
                <option value="clear">Clear</option>
              </select>
        </section>
        <section class="search-section mt-5" >
            <h4 class="text-uppercase">Discover your next <br> Adventure</h4>
            <div class="px-5 d-flex flex-column justify-content-center align-items-center">
                <form class="form-search d-flex flex-column gap-3">
                    <div class="d-flex">
                        <input type="text" class="form-control" id="search-input" placeholder="Escribe un lugar o actividad...">
                        <button type="submit" class="search-btn">Search</button>
                    </div>
                </form>
            </div>
        </section>
       <!--  <section class="d-flex justify-content-center align-items-center mb-5 map-section">
            <div id="map" style="display: none;"></div>
        </section> -->
        <section class="mt-5">
            <div class="place-card w-100 bg-warning">
                <div class="place-banner">
                    <img src="https://via.placeholder.com/600x200" alt="Imagen del lugar" class="banner-img">
                </div>
    
                <div class="place-details text-center">
                    <h3 class="place-title">Nombre del Lugar</h3>
                </div>
            </div>
        </section>
    </div>
    <script src='https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.25.1/maps/maps-web.min.js'></script>
    <script src="./src/script.js" type="module"></script>
</body>
</html>
